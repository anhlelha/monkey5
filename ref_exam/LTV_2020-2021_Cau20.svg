<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <style>
    .edge { stroke: #222; stroke-width: 1.8; fill: none; stroke-linecap: round; }
    .pt   { fill: #ff8a3d; stroke: #ff8a3d; }
    .lbl  { font-size: 22px; font-style: italic; fill: #111; }
    .tick { stroke: #888; stroke-width: 1; fill: none; }
  </style>

  <!-- Triangle ABC and cevian lines -->
  <!--
    Coordinates (math -> SVG, y inverted):
      B = (0,0)      -> (50, 400)
      C = (10,0)     -> (450, 400)
      M = (5,0)      -> (250, 400)   midpoint of BC
      A = (3,5)      -> (170, 200)
      N = A + 1/5(C-A) = (4.4, 4)    -> (226, 240)
      P = intersect(BA extended, MN extended) = (4, 20/3) -> (210, 400 - 266.67) ≈ (210, 133)
  -->

  <!-- Side BC -->
  <line class="edge" x1="50"  y1="400" x2="450" y2="400"/>
  <!-- Side AC (and A-N-C collinear) -->
  <line class="edge" x1="170" y1="200" x2="450" y2="400"/>
  <!-- Side BA extended through A up to P  (B-A-P collinear) -->
  <line class="edge" x1="50"  y1="400" x2="210" y2="133"/>
  <!-- Secant through P, N, M  (P-N-M collinear) -->
  <line class="edge" x1="210" y1="133" x2="250" y2="400"/>

  <!-- Tiny tick marks to indicate BM = MC -->
  <line class="tick" x1="146" y1="394" x2="154" y2="406"/>
  <line class="tick" x1="346" y1="394" x2="354" y2="406"/>

  <!-- Points -->
  <circle class="pt" cx="50"  cy="400" r="4.5"/>
  <circle class="pt" cx="450" cy="400" r="4.5"/>
  <circle class="pt" cx="250" cy="400" r="4.5"/>
  <circle class="pt" cx="170" cy="200" r="4.5"/>
  <circle class="pt" cx="226" cy="240" r="4.5"/>
  <circle class="pt" cx="210" cy="133" r="4.5"/>

  <!-- Labels -->
  <text class="lbl" x="32"  y="422">B</text>
  <text class="lbl" x="455" y="422">C</text>
  <text class="lbl" x="244" y="426">M</text>
  <text class="lbl" x="142" y="198">A</text>
  <text class="lbl" x="232" y="236">N</text>
  <text class="lbl" x="200" y="122">P</text>
</svg>
